name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest black pre-commit
      - name: Run policy & guard script
        run: |
          python main.py
      - name: Run tests
        run: pytest -q

      - name: Rust test workspace
        run: |
          cargo test --workspace --no-default-features
          cargo test --workspace --no-default-features -- --nocapture

      - name: Run benchmarks
        run: cargo bench --no-default-features -- --quiet || true

      - name: Check formatting
        run: pre-commit run --all-files
